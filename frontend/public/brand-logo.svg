<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8ff3a"/>
      <stop offset="1" stop-color="#8eff01"/>
    </linearGradient>
    <filter id="gc" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="150" fill="#0a0e15"/>
  <rect x="150" y="150" width="196" height="196" rx="52" fill="none" stroke="#8b53fe" stroke-width="26" opacity="0.85"/>
  <rect x="196" y="196" width="196" height="196" rx="52" fill="#0a0e15"/>
  <g filter="url(#gc)">
    <rect x="196" y="196" width="196" height="196" rx="52" fill="none" stroke="url(#lc)" stroke-width="30"/>
  </g>
</svg>
